# BTC Research Platform Configuration

# ── Data source ────────────────────────────────────────────────────────────────
exchange: binance
symbol: BTC/USDT
symbol_file: BTCUSDT          # folder/file-safe version of the symbol

# UTC date range for initial download
start_date: "2018-01-01"
end_date:   null              # null = up to now

# Set to null to auto-detect all timeframes the exchange supports.
# Or provide an explicit list to restrict, e.g.:
#   enabled_timeframes: ["1m", "5m", "15m", "1h", "4h", "1d"]
enabled_timeframes: null

# ── Storage ────────────────────────────────────────────────────────────────────
data_dir: data
raw_subdir: raw
features_subdir: features
metadata_subdir: metadata

# ── Simulation defaults ────────────────────────────────────────────────────────
fees: 0.00075         # 0.075 % per side (Binance taker)
slippage: 0.0003      # 0.03 % per side
leverage: 1.0
risk_per_trade: 0.01  # 1 % of equity per trade

# ── Strategy families to run ───────────────────────────────────────────────────
# Comment out any family you want to skip
enabled_strategies:
  - trend
  - mean_reversion
  - breakout
  - structure
  - regime
  - ensemble

# ── Optimisation ──────────────────────────────────────────────────────────────
optimization:
  method: grid             # grid | random
  random_n: 200            # only used when method=random
  n_jobs: 1                # parallel workers (-1 = all cores)

  # Shared parameter ranges (strategies pick what they need)
  ema_fast:      [5, 8, 13, 21]
  ema_slow:      [21, 34, 55, 89, 144]
  sma_lengths:   [20, 50, 100, 200]
  rsi_length:    [7, 9, 14, 21]
  rsi_ob:        [65, 70, 75, 80]
  rsi_os:        [20, 25, 30, 35]
  atr_length:    [7, 10, 14, 21]
  atr_sl_mult:   [1.0, 1.5, 2.0, 2.5, 3.0]
  atr_tp_mult:   [1.5, 2.0, 3.0, 4.0]
  bb_length:     [14, 20, 30]
  bb_std:        [1.5, 2.0, 2.5]
  donchian_len:  [10, 20, 40, 55]
  adx_length:    [10, 14, 20]
  adx_threshold: [20, 25, 30]
  vol_lookback:  [10, 20, 40]
  squeeze_len:   [10, 20]
  swing_lookback: [5, 10, 20]
  sl_pct:        [0.005, 0.01, 0.015, 0.02, 0.03]
  tp_pct:        [0.01, 0.02, 0.03, 0.05, 0.07]
  trail_mult:    [1.0, 1.5, 2.0, 2.5]

# ── Validation ────────────────────────────────────────────────────────────────
validation:
  is_ratio: 0.60            # in-sample fraction
  oos_ratio: 0.20           # out-of-sample fraction
  test_ratio: 0.20          # held-out test fraction
  wf_windows: 5             # number of walk-forward windows
  min_trades: 30            # reject results with fewer trades
  min_profit_factor: 1.0    # reject if PF < this in OOS
  stress_fee_mult: 2.0      # multiply fees by this for stress test
  stress_slip_mult: 2.0     # multiply slippage by this for stress test

# ── Reporting ─────────────────────────────────────────────────────────────────
reporting:
  output_dir: outputs
  top_n: 20                 # how many top strategies to show in tables
  plot_equity_curves: true
  plot_heatmaps: true
  html_report: true
